        <style>
            :root {

            /* ===== RESET & BASE ===== */
            * {
                margin: 0;

            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;

            /* ===== TRADING WORDS BACKGROUND ===== */
            .trading-bg {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                overflow: hidden;
                z-index: 0;
                pointer-events: none;
                opacity: 0.15;

            .trading-word {
                position: absolute;
                font-size: 14px;
                font-weight: 600;
                color: #4FC3F7;
                text-transform: uppercase;
                letter-spacing: 2px;
                white-space: nowrap;
                animation: floatWord linear infinite;
                text-shadow: 0 0 20px rgba(79, 195, 247, 0.3);
            }

            .trading-word:nth-child(1) {
                animation-duration: 25s;
                top: 5%;
                left: -10%;

            }
            .trading-word:nth-child(2) {

            .trading-word:nth-child(3) {

                font-size: 22px;

            .trading-word:nth-child(4) {

            .trading-word:nth-child(5) {

            }

                animation: floatWordRight linear infinite;

            @keyframes floatWord {
                0% {
                    transform: translateX(0) rotate(0deg);
                    opacity: 0;
                }
                5% {
                    opacity: 1;
                }
                90% {
                    opacity: 1;
                }
                100% {
                    transform: translateX(calc(100vw + 200px)) rotate(3deg);
                    opacity: 0;
                }
            }

            @keyframes floatWordRight {
                0% {
                    transform: translateX(0) rotate(0deg);
                    opacity: 0;
                }
                5% {
                    opacity: 1;
                }
                90% {
                    opacity: 1;
                }
                100% {
                    transform: translateX(calc(-100vw - 200px)) rotate(-3deg);
                    opacity: 0;
                }
            }

            /* ===== LOADER CONTAINER ===== */
            .loader-container {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 30px;
                padding: 20px;
                width: 100%;
                max-width: 400px;
                animation: fadeIn 0.5s ease-out;
                position: relative;
                z-index: 1;
                background: rgba(10, 10, 10, 0.7);
                backdrop-filter: blur(10px);
                border-radius: 24px;
                border: 1px solid rgba(79, 195, 247, 0.1);
                box-shadow: 0 0 60px rgba(79, 195, 247, 0.05);
            }

            /* ===== LOGO / BRAND ===== */
            .brand {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }

            .brand-icon {
                width: 80px;
                height: 80px;

                border-radius: 20px;

                justify-content: center;
                font-size: 40px;
                font-weight: 800;
                color: #4FC3F7;
                box-shadow: 0 8px 32px rgba(79, 195, 247, 0.3);
                animation: pulse 2s ease-in-out infinite;
                border: 2px solid rgba(79, 195, 247, 0.2);
            }

            .brand-name {
                font-size: 28px;
                font-weight: 700;
                background: linear-gradient(135deg, #4FC3F7, #f44336);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                letter-spacing: 1px;
            }

            .brand-sub {
                font-size: 12px;
                color: #4FC3F7;
                letter-spacing: 4px;
                text-transform: uppercase;
                opacity: 0.7;
            }

            /* ===== SPINNER ===== */
            .spinner-wrapper {
                position: relative;
                width: 120px;
                height: 120px;
            }

            .spinner {
                width: 120px;
                height: 120px;
                border-radius: 50%;
                border: 4px solid rgba(79, 195, 247, 0.1);
                border-top: 4px solid #4FC3F7;
                border-right: 4px solid #f44336;
                animation: spin 1s cubic-bezier(0.6, 0, 0.4, 1) infinite;
                box-shadow: 0 0 40px rgba(79, 195, 247, 0.1);
            }

            /* ===== PROGRESS BAR ===== */
            .progress-wrapper {
                width: 100%;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .progress-track {
                width: 100%;
                height: 12px;
                background: rgba(79, 195, 247, 0.05);
                border-radius: 6px;
                overflow: hidden;
                position: relative;
                border: 1px solid rgba(79, 195, 247, 0.05);
            }

            .progress-fill {
                height: 100%;
                width: 0%;
                background: linear-gradient(90deg, #1a237e, #4FC3F7, #f44336, #4FC3F7, #1a237e);
                background-size: 400% 100%;
                border-radius: 6px;
                transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                animation: shimmer 2s infinite;
                box-shadow: 0 0 20px rgba(79, 195, 247, 0.3);
            }

            .progress-label {
                display: flex;
                justify-content: space-between;
                font-size: 12px;
                color: #888;
            }

            .progress-percent {
                font-weight: 600;
                color: #4FC3F7;
                font-variant-numeric: tabular-nums;
            }

            /* ===== MESSAGE ===== */
            .message {
                font-size: 14px;
                color: #666;
                text-align: center;
                min-height: 24px;
                transition: opacity 0.3s;
            }

            .message .highlight {
                color: #4FC3F7;
            }

            /* ===== DOTS ANIMATION ===== */
            .dots::after {
                content: '';
                animation: dots 1.5s steps(4, end) infinite;
            }

            /* ===== KEYFRAMES ===== */
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }

            @keyframes pulse {
                0%,
                100% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.05);
                }
            }

            @keyframes shimmer {
                0% {
                    background-position: 400% 0;
                }
                100% {
                    background-position: -400% 0;
                }
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px) scale(0.95);
                }
                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }

            @keyframes dots {
                0% {
                    content: '';
                }
                25% {
                    content: '.';
                }
                50% {
                    content: '..';
                }
                75% {
                    content: '...';
                }
                100% {
                    content: '';
                }
            }

            /* ===== RESPONSIVE ===== */
            @media (max-width: 480px) {
                .brand-icon {
                    width: 60px;
                    height: 60px;
                    font-size: 30px;
                }

                .brand-name {
                    font-size: 22px;
                }

                .spinner-wrapper {
                    width: 90px;
                    height: 90px;
                }

                .spinner {
                    width: 90px;
                    height: 90px;
                }

                .loader-container {
                    gap: 24px;
                    padding: 16px;
                    margin: 16px;
                    backdrop-filter: blur(20px);
                }

                .trading-word {
                    font-size: 10px !important;
                }
            }

            /* ===== SUCCESS STATE ===== */
            .loader-container.success .spinner {
                border-color: #4FC3F7;
                animation: none;
                transform: scale(0.8);
                opacity: 0;
            }

            .loader-container.success .progress-fill {
                width: 100% !important;
                background: linear-gradient(90deg, #1a237e, #4FC3F7, #f44336) !important;
            }

            .loader-container.success .brand-icon {
                background: linear-gradient(135deg, #1a237e, #0d47a1);
                border-color: #4FC3F7;
                animation: successPulse 0.5s ease-out;
            }

            @keyframes successPulse {
                0% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.2);
                }
                100% {
                    transform: scale(1);
                }
            }

            /* ===== GLOW EFFECT ===== */
            .glow {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 200px;
                height: 200px;
                background: radial-gradient(circle, rgba(79, 195, 247, 0.05), transparent 70%);
                border-radius: 50%;
                pointer-events: none;
                animation: pulseGlow 3s ease-in-out infinite;
            }

            @keyframes pulseGlow {
                0%,
                100% {
                    transform: translate(-50%, -50%) scale(1);
                    opacity: 0.5;
                }
                50% {
                    transform: translate(-50%, -50%) scale(1.2);
                    opacity: 1;
                }
            }
        </style>

        <script type="text/javascript">
            // ============================================================
            // CONFIGURATION
            // ============================================================
            const CONFIG = {
                totalSteps: 100,
                stepDuration: 50, // 5 seconds total (100 steps * 50ms)
                messages: [
                    'Connecting to market...',
                    'Analyzing trends...',
                    'Loading strategies...',
                    'Syncing data...',
                    'Preparing charts...',
                    'Connecting to server...',
                    'Loading dashboard...',
                    'Almost ready...'
                ]
            };

            // ============================================================
            // DOM REFS
            // ============================================================
            const progressFill = document.getElementById('progressFill');
            const progressPercent = document.getElementById('progressPercent');
            const progressMessage = document.getElementById('progressMessage');
            const messageEl = document.getElementById('message');
            const loaderContainer = document.getElementById('loader');

            // ============================================================
            // STATE
            // ============================================================
            let progress = 0;
            let isComplete = false;

            // ============================================================
            // MAIN PROGRESS FUNCTION
            // ============================================================
            function updateProgress() {
                if (isComplete) return;

                // Increment progress smoothly
                progress += 2;
                if (progress >= 100) {
                    progress = 100;
                    isComplete = true;
                    setTimeout(() => {
                        loaderContainer.style.opacity = '0';
                        setTimeout(() => {
                            loaderContainer.remove();
                        }, 500);
                    }, 500);
                }

                // Update progress bar
                progressFill.style.width = progress + '%';
                progressPercent.textContent = Math.round(progress) + '%';

                // Update message based on progress
                const msgIndex = Math.floor((progress / 100) * CONFIG.messages.length);
                if (msgIndex < CONFIG.messages.length) {
                    progressMessage.textContent = CONFIG.messages[Math.min(msgIndex, CONFIG.messages.length - 1)];
                }

                // Update bottom message with dots effect
                if (progress < 100) {
                    const dots = '.'.repeat(Math.floor((progress / 100) * 3) % 4);
                    messageEl.innerHTML = `
                        <span class="highlight">RamzFX</span> is getting ready${dots}
                    `;
                }

                // Schedule next update (exactly 5 seconds total)
                if (!isComplete) {
                    setTimeout(updateProgress, CONFIG.stepDuration);
                }
            }

            // Start the progress on page load
            updateProgress();
        </script>
